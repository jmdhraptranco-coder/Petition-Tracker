<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Set New Password</title>
  <style>
    body { font-family: Arial, sans-serif; background:#f4f6f8; color:#1f2937; margin:0; padding:32px 16px; }
    .card { max-width:420px; margin:0 auto; background:#fff; border:1px solid #d1d5db; border-radius:16px; padding:24px; box-shadow:0 12px 30px rgba(15,23,42,.08); }
    h1 { margin:0 0 8px; font-size:1.4rem; }
    p { margin:0 0 18px; color:#4b5563; line-height:1.5; }
    label { display:block; margin:14px 0 6px; font-weight:600; }
    input { width:100%; padding:12px 14px; border:1px solid #cbd5e1; border-radius:10px; font-size:1rem; box-sizing:border-box; }
    button { width:100%; margin-top:14px; padding:12px 14px; border-radius:10px; border:none; cursor:pointer; font-size:1rem; background:#111827; color:#fff; }
    .flash { margin:0 0 12px; padding:10px 12px; border-radius:10px; background:#eff6ff; color:#1d4ed8; }
    a { color:#111827; text-decoration:none; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Set New Password</h1>
    <p>OTP verification is complete for <strong>{{ username }}</strong>. Choose a new password.</p>
    {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
    {% for category, message in messages %}
    <div class="flash">{{ message }}</div>
    {% endfor %}
    {% endif %}
    {% endwith %}
    <form method="POST" action="{{ url_for('forgot_password_set') }}">
      <label for="new_password">New Password</label>
      <input id="new_password" name="new_password" type="password" required>
      <label for="confirm_password">Confirm Password</label>
      <input id="confirm_password" name="confirm_password" type="password" required>
      <button type="submit">Update Password</button>
    </form>
    <p><a href="{{ url_for('login') }}">Back to login</a></p>
  </div>
</body>
</html>
